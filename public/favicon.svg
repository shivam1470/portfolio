<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Screen/Lid -->
  <rect x="15" y="15" width="70" height="45" rx="4" fill="#1f2937"/>
  <!-- Inner Screen -->
  <rect x="18" y="18" width="64" height="39" rx="2" fill="#000"/>
  <!-- Indigo Screen Glow -->
  <rect x="22" y="22" width="56" height="31" rx="1" fill="#4f46e5" fill-opacity="0.2"/>
  
  <!-- Base -->
  <path d="M10 60 L90 60 L95 70 L5 70 Z" fill="#374151"/>
  <!-- Bottom Lip -->
  <rect x="10" y="60" width="80" height="3" fill="#111827"/>
  
  <!-- Stylized SM on screen -->
  <text x="50" y="40" dominant-baseline="central" text-anchor="middle" fill="#4f46e5" font-family="monospace" font-weight="bold" font-size="12" opacity="0.8">&lt;SM /&gt;</text>
</svg>
